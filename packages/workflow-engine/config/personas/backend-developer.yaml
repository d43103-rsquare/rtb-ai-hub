  - Redis
  - REST/GraphQL
  - Docker
  - Drizzle ORM
  - Transaction Management
handoffTriggers:
  qa: 백엔드 구현 완료 후 테스트 요청 시
  system-planner: 아키텍처 결정 필요 시
  devops: 배포 설정 필요 시
